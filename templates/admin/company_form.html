{% extends 'base.html' %}
{% block title %}Add Company - Admin{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card p-4">
        <h4 class="fw-bold mb-4">Add Company</h4>
        <form method="post" enctype="multipart/form-data">{% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-500 small">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
          </div>
          {% endfor %}
          <button type="submit" class="btn btn-primary me-2">Add Company</button>
          <a href="{% url 'manage_companies' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
