{% extends 'base.html' %}
{% block title %}Update Application Status{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <h5 class="fw-bold mb-1">Update Application Status</h5>
        <p class="text-muted small mb-4">{{ application.applicant.get_full_name }} → {{ application.job.title }}</p>
        <form method="post">{% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-500 small">{{ field.label }}</label>
            {{ field }}
          </div>
          {% endfor %}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary">Update Status</button>
            <a href="{% url 'manage_applications' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
