{% extends 'base.html' %}
{% block title %}{{ title }} - Admin{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card p-4">
        <h4 class="fw-bold mb-4">{{ title }}</h4>
        <form method="post">{% csrf_token %}
          <div class="row g-3">
            {% for field in form %}
            <div class="col-md-{% if field.name == 'description' or field.name == 'requirements' %}12{% else %}6{% endif %}">
              <label class="form-label fw-500 small">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
            </div>
            {% endfor %}
          </div>
          <div class="mt-4">
            <button type="submit" class="btn btn-primary me-2">Save Job</button>
            <a href="{% url 'manage_jobs' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
